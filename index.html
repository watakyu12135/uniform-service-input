<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユニフォーム申請</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  overflow-x: hidden; /* ←追加 */
}

table {
  border-collapse: collapse;
    min-width: 900px; /* ←追加 */
}

.table-wrap {
  overflow-x: auto;
　width: 100%;
}


th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: center;
}

td {
  white-space: nowrap;
}

td:first-child, th:first-child {
  min-width: 80px;
}
  
@media (max-width: 600px) {
  input[type="number"] {
    width: 40px;
  }

  table {
    font-size: 12px;
  }
}


.hidden {
  display: none;
}

button {
  margin-top: 10px;
}


  
</style>
</head>

<body>

<h2>ユニフォーム申請</h2>

名前：<input type="text"><br><br>

<div class="table-wrap">
  <table id="table"></table>
</div>

<button onclick="checkTotal()">入力チェック</button>
<button onclick="submitData()">登録</button>


<div id="result"></div>

<script>

const ALL_SIZES = ["S","M","L","LL","EL","BL"];

// JSON読み込み
function getCustomer() {
  const url = new URL(window.location.href);
  return url.searchParams.get("customer") || "customerA";
}

fetch(`config/${getCustomer()}.json`)
  .then(res => res.json())
  .then(data => {
    createTable(data);
  });

// テーブル生成
function createTable(data) {

  const table = document.getElementById("table");

  let html = "";

  // ヘッダ
  let header = "<tr><th>商品</th><th>色</th>";
  ALL_SIZES.forEach(s => header += `<th>${s}</th>`);
  header += "<th>別寸</th><th>採寸</th></tr>";

  html += header;

  const products = data.jobs[0].products;

  products.forEach(p => {
    p.colors.forEach(color => {

      let row = `<tr><td>${p.name}</td><td>${color}</td>`;

      ALL_SIZES.forEach(size => {
        if (!p.sizes.includes(size) || p.disabledSizes?.includes(size)) {
          row += "<td>/</td>";
        } else {
          row += `<td><input type="number" min="0"></td>`;
        }
      });

      row += `<td><input type="number" class="special" onchange="checkSpecial(this)"></td>`;
      row += `<td><button class="measure hidden">採寸</button></td>`;
      row += "</tr>";

      html += row;

    });
  });

  table.innerHTML = html;
}



// 別寸チェック
function checkSpecial(el) {
  const row = el.closest("tr");
  const btn = row.querySelector(".measure");

  if (Number(el.value) > 0) {
    btn.classList.remove("hidden");
  } else {
    btn.classList.add("hidden");
  }
}


// 合計チェック（シンプル版）
function checkTotal() {
  let inputs = document.querySelectorAll("input[type='number']");
  let total = 0;

  inputs.forEach(i => {
    total += Number(i.value) || 0;
  });

  if (total === 5) {
    document.getElementById("result").innerText = "OK（合計5）";
  } else {
    document.getElementById("result").innerText = "NG 合計：" + total;
  }
}

function submitData() {

  const rows = document.querySelectorAll("#table tr");
  let data = [];

  rows.forEach((row, i) => {
    if (i === 0) return; // ヘッダ

    const cells = row.querySelectorAll("td");

    const product = cells[0].innerText;
    const color = cells[1].innerText;

    // サイズごとの入力
    for (let j = 0; j < ALL_SIZES.length; j++) {

      const input = cells[j + 2].querySelector("input");

      if (input) {
        const value = Number(input.value) || 0;

        if (value > 0) {
          data.push({
  ...common,
  product: product,
  color: color,
  size: ALL_SIZES[j],
  qty: value
});

        }
      }
    }

    // 別寸
    const special = cells[ALL_SIZES.length + 2].querySelector("input");
    if (special && Number(special.value) > 0) {
      data.push({
        product: product,
        color: color,
        size: "別寸",
        qty: Number(special.value)
      });
    }

  });

const common = {
  id: Date.now(),
  createdAt: new Date().toISOString(),
  updatedAt: new Date().toISOString(),

  customerCode: "A001",
  customerName: "A病院",

  sei: "山田",
  mei: "太郎",
  gender: "male",
  job: "看護部"
};
  
  console.log(data);
　fetch(https://script.google.com/macros/s/AKfycbycFkYteNOah_vtLt0lTbugo7W5o-oSPHkRWpwKC-p-5G3JW_DkIAF5pxUjw6piJYeRRw/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(data)
});

}
  
</script>

</body>
</html>
