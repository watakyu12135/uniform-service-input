<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユニフォーム申請</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 5px;
  text-align: center;
}

input[type="number"] {
  width: 60px;
}

.hidden {
  display: none;
}

button {
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>ユニフォーム申請</h2>

名前：<input type="text"><br><br>

<table>
<tr>
  <th>商品</th>
  <th>色</th>
  <th>S</th>
  <th>M</th>
  <th>L</th>
  <th>LL</th>
  <th>EL</th>
  <th>BL</th>
  <th>別寸</th>
  <th>採寸</th>
</tr>

<tr>
  <td>商品A</td>
  <td>白</td>
  <td><input type="number" class="size"></td>
  <td><input type="number" class="size"></td>
  <td><input type="number" class="size"></td>
  <td><input type="number" class="size"></td>
  <td><input type="number" class="size"></td>
  <td>/</td>
  <td><input type="number" class="special" onchange="checkSpecial()"></td>
  <td><button class="measure hidden">採寸</button></td>
</tr>

<tr>
  <td>商品A</td>
  <td>青</td>
  <td><input type="number" class="size"></td>
  <td><input type="number" class="size"></td>
  <td><input type="number" class="size"></td>
  <td><input type="number" class="size"></td>
  <td><input type="number" class="size"></td>
  <td>/</td>
  <td><input type="number" class="special" onchange="checkSpecial()"></td>
  <td><button class="measure hidden">採寸</button></td>
</tr>

</table>

<button onclick="checkTotal()">入力チェック</button>

<div id="result"></div>

<script>

// 別寸チェック → 採寸ボタン表示
function checkSpecial() {
  let specials = document.querySelectorAll(".special");
  let measures = document.querySelectorAll(".measure");

  specials.forEach((input, i) => {
    if (Number(input.value) > 0) {
      measures[i].classList.remove("hidden");
    } else {
      measures[i].classList.add("hidden");
    }
  });
}

// 合計チェック（例）
function checkTotal() {
  let inputs = document.querySelectorAll(".size, .special");
  let total = 0;

  inputs.forEach(i => {
    total += Number(i.value) || 0;
  });

  if (total === 5) {
    document.getElementById("result").innerText = "OK（合計5）";
  } else {
    document.getElementById("result").innerText = "NG 合計：" + total;
  }
}

</script>

</body>
</html>
