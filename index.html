<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユニフォーム申請</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  overflow-x: hidden;
}

table {
  border-collapse: collapse;
  min-width: 600px;
}

.table-wrap {
  overflow-x: auto;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: center;
}

.hidden {
  display: none;
}

button {
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>ユニフォーム申請</h2>

顧客：A病院<br><br>

氏：<input id="sei">
名：<input id="mei"><br><br>

性別：
<select id="gender" onchange="changeJob()">
  <option value="">選択</option>
  <option value="male">男性</option>
  <option value="female">女性</option>
</select><br><br>

職種：
<select id="job" onchange="changeJob()">
  <option value="">選択</option>
  <option value="看護部">看護部</option>
  <option value="リハ">リハ</option>
  </select><br><br>

<div class="table-wrap">
  <table id="table"></table>
</div>

<button onclick="submitData()">登録</button>

<script>

function getCustomer() {
  return "customerA";
}

let currentData;

// ✅ JSON読み込み
fetch(`config/${getCustomer()}.json`)
  .then(res => res.json())
  .then(data => {
    currentData = data;

    // ✅ 初期表示メッセージ
    document.getElementById("table").innerHTML =
      "<tr><td colspan='5'>性別と職種を選択してください</td></tr>";
  });

// ✅ 職種変更で表生成
function changeJob() {

  const job = document.getElementById("job").value;
  const gender = document.getElementById("gender").value;

  if (!job || !gender) {
    document.getElementById("table").innerHTML =
      "<tr><td colspan='5'>性別と職種を選択してください</td></tr>";
    return;
  }

  createTable(currentData, job, gender);
}
// ✅ 表生成（正しい版）
function createTable(data, selectedJob, selectedGender) {

  const table = document.getElementById("table");

  let html = `<tr>
    <th>商品</th>
    <th>色</th>
    <th>サイズ</th>
    <th>数量</th>
    <th>採寸</th>
  </tr>`;

  const jobData = data.jobs.find(j =>
    j.job === selectedJob && j.gender === selectedGender
  );

  if (!jobData) {
    table.innerHTML = "<tr><td colspan='5'>該当データなし</td></tr>";
    return;
  }

  jobData.products.forEach(p => {

    p.colors.forEach(color => {

      let row = `<tr>
        <td>${p.name}</td>
        <td>${color}</td>`;

      // サイズ
      row += `<td>
        <select onchange="checkSize(this)">
          <option value="">選択</option>`;

      p.sizes.forEach(size => {
        if (!p.disabledSizes?.includes(size)) {
          row += `<option>${size}</option>`;
        }
      });

      row += `<option value="別寸">別寸</option>`;
      row += `</select></td>`;

      // 数量
      row += `<td><input type="number" min="0"></td>`;

      // 採寸
      row += `<td><button class="measure hidden">採寸</button></td>`;

      row += `</tr>`;

      html += row;

    });

  });

  table.innerHTML = html;
}

// ✅ 別寸チェック
function checkSize(select) {

  const row = select.closest("tr");
  const btn = row.querySelector(".measure");

  if (select.value === "別寸") {
    btn.classList.remove("hidden");
  } else {
    btn.classList.add("hidden");
  }
}

// ✅ 登録
  function submitData() {

  // ✅ 入力チェックここから
  if (!document.getElementById("sei").value) {
    alert("氏を入力してください");
    return;
  }

  if (!document.getElementById("mei").value) {
    alert("名を入力してください");
    return;
  }

  if (!document.getElementById("gender").value) {
    alert("性別を選択してください");
    return;
  }

  if (!document.getElementById("job").value) {
    alert("職種を選択してください");
    return;
  }

  // ✅ ここから元の処理


  const common = {
    id: Date.now(),
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    customerCode: "A001",
    customerName: "A病院",
    sei: document.getElementById("sei").value,
    mei: document.getElementById("mei").value,
    gender: document.getElementById("gender").value,
    job: document.getElementById("job").value
  };

  const rows = document.querySelectorAll("#table tr");
  let data = [];

  rows.forEach((row, i) => {

    if (i === 0) return;

    const cells = row.querySelectorAll("td");

    const product = cells[0].innerText;
    const color = cells[1].innerText;

    const size = cells[2].querySelector("select").value;
    const qty = Number(cells[3].querySelector("input").value) || 0;

    if (size && qty > 0) {
      data.push({
        ...common,
        product,
        color,
        size,
        qty
      });
    }
  });

  if (data.length === 0) {
  alert("商品が入力されていません（サイズ・数量）");
  return;
}
    
  console.log(data);

  fetch("https://script.google.com/macros/s/AKfycbycFkYteNOah_vtLt0lTbugo7W5o-oSPHkRWpwKC-p-5G3JW_DkIAF5pxUjw6piJYeRRw/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(data)
  });

  alert("登録送信しました（シート確認）");
}

</script>

</body>
</html>
