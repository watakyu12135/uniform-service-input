<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユニフォーム申請</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  overflow-x: hidden;
}

table {
  border-collapse: collapse;
  min-width: 600px;
}

.table-wrap {
  overflow-x: auto;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 4px;
  text-align: center;
}

.hidden {
  display: none;
}

button {
  margin-top: 10px;
}

#categoryStatus {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  background: #f9f9f9;
}

.category-ok {
  color: green;
  font-weight: bold;
}

.category-warning {
  color: orange;
  font-weight: bold;
}

.category-over {
  color: red;
  font-weight: bold;
}

.category-normal {
  color: black;
  font-weight: bold;
}

.category-heading {
  margin-top: 18px;
  padding: 10px;
  background: #eef5ff;
  border-left: 5px solid #4a90e2;
  font-weight: bold;
}

.category-note {
  margin: 6px 0 8px 0;
  padding: 8px;
  background: #fff7e6;
  border-left: 4px solid #f5a623;
  font-size: 14px;
}

.category-title {
  font-weight: bold;
}

.category-count {
  margin-left: 8px;
  font-size: 14px;
  color: #333;
}

.category-count-ok {
  color: green;
}

.category-count-warning {
  color: orange;
}

.category-count-over {
  color: red;
}

  
</style>
</head>

<body>

<h2>ユニフォーム申請</h2>

<div id="customerInfo">顧客：読み込み中...</div>
<br>

氏：<input id="sei">
名：<input id="mei"><br><br>

性別：
<select id="gender" onchange="changeJob()">
  <option value="">選択</option>
  <option value="男性">男性</option>
  <option value="女性">女性</option>
</select><br><br>

職種：
<select id="job" onchange="changeJob()">
  <option value="">選択</option>
  <option value="看護師">看護師</option>
  <option value="一般事務">一般事務</option>
  <option value="医療秘書">医療秘書</option>
  <option value="健診センター">健診センター</option>
</select><br><br>

<div class="table-wrap">
  <table id="table"></table>
</div>

<div id="categoryStatus"></div>

<button onclick="submitData()">登録</button>

<script>

function getCustomer() {
  const url = new URL(window.location.href);
  return url.searchParams.get("customer") || "gvhp8hex";
}

let currentData;

// JSON読み込み
fetch(`config/${getCustomer()}.json`)
  .then(res => {
    if (!res.ok) {
      throw new Error("JSONファイルが見つかりません");
    }
    return res.json();
  })
  .then(data => {
    currentData = data;

    document.getElementById("customerInfo").innerText =
      "顧客：" + currentData.customerName;

    document.getElementById("table").innerHTML =
      "<tr><td colspan='5'>性別と職種を選択してください</td></tr>";

    document.getElementById("categoryStatus").innerHTML = "";
  })
  .catch(error => {
    document.getElementById("table").innerHTML =
      "<tr><td colspan='5'>読み込みに失敗しました：" + error.message + "</td></tr>";
  });


// 性別・職種変更で表生成
function changeJob() {

  const job = document.getElementById("job").value;
  const gender = document.getElementById("gender").value;

  if (!job || !gender) {
    document.getElementById("table").innerHTML =
      "<tr><td colspan='5'>性別と職種を選択してください</td></tr>";
    document.getElementById("categoryStatus").innerHTML = "";
    return;
  }

  if (!currentData) {
    document.getElementById("table").innerHTML =
      "<tr><td colspan='5'>データ読み込み中です</td></tr>";
    return;
  }

  createTable(currentData, job, gender);
}


// 表生成
function createTable(data, selectedJob, selectedGender) {

  const table = document.getElementById("table");

  const jobData = data.jobs.find(j =>
    j.job === selectedJob && j.gender === selectedGender
  );

  if (!jobData) {
    table.innerHTML = "<tr><td colspan='6'>該当データなし</td></tr>";
    document.getElementById("categoryStatus").innerHTML = "";
    return;
  }

  let html = "";

  // categoryDisplay がある場合は表示順通り、なければ商品カテゴリ順にする
  let categoryDisplay = jobData.categoryDisplay || [];

  if (categoryDisplay.length === 0) {
    const categoryNames = [...new Set(jobData.products.map(p => p.productCategory))];

    categoryDisplay = categoryNames.map((cat, index) => ({
      productCategory: cat,
      displayOrder: index + 1,
      heading: cat + "を選んで下さい",
      note: ""
    }));
  }

  categoryDisplay
    .sort((a, b) => a.displayOrder - b.displayOrder)
    .forEach(categoryInfo => {

      const category = categoryInfo.productCategory;

      const products = jobData.products.filter(p =>
        p.productCategory === category
      );

      if (products.length === 0) return;

      // カテゴリ見出し
      html += `<tr class="category-header">
  <td colspan="6">
    <div class="category-heading" data-category-heading="${category}">
      <span class="category-title">${category}を選択</span>
      <span class="category-count"></span>
    </div>
`;

      if (categoryInfo.note) {
        html += `<div class="category-note">${categoryInfo.note}</div>`;
      }

      html += `</td></tr>`;

      // 商品テーブルの見出し
      html += `<tr>
        <th>商品</th>
	<th>品番</th>
        <th>色</th>
        <th>サイズ</th>
        <th>数量</th>
        <th>採寸</th>
      </tr>`;

      products.forEach(p => {

       let row = `<tr
  data-product-code="${p.productCode}"
  data-product-category="${p.productCategory}"
>
  <td>${p.name}</td>
  <td>${p.productCode}</td>
  <td>${p.color}</td>`;

        const standardSizes = p.sizes.filter(size => size.type === "standard");
        const specialSizes = p.sizes.filter(size => size.type !== "standard");

        row += `<td>
          <select class="mainSize" onchange="checkMainSize(this); updateCategorySummary();">
            <option value="">選択</option>`;

        standardSizes.forEach(size => {
          row += `<option value="${size.value}" data-size-type="${size.type}">
            ${size.label}
          </option>`;
        });

        if (specialSizes.length > 0) {
          row += `<option value="__OTHER__">その他</option>`;
        }

        row += `</select>`;

        row += `<div class="specialSizeArea hidden" style="margin-top:6px;">
          <select class="specialSize" onchange="checkSpecialSize(this); updateCategorySummary();">
            <option value="">特注サイズを選択</option>`;

        specialSizes.forEach(size => {
          row += `<option value="${size.value}" data-size-type="${size.type}">
            ${size.label}
          </option>`;
        });

        row += `</select>

          <div class="bespokeInputArea hidden" style="margin-top:6px;">
            <input type="text" class="bespokeInput" placeholder="別寸サイズを入力">
          </div>
        </div>`;

        row += `</td>`;

        row += `<td>
          <input type="number" min="0" oninput="updateCategorySummary()">
        </td>`;

        row += `<td>
          <button class="measure hidden">採寸</button>
        </td>`;

        row += `</tr>`;

        html += row;
      });
    });

  table.innerHTML = html;

  updateCategorySummary();
}

// 通常サイズ／その他の切替
function checkMainSize(select) {

  const row = select.closest("tr");
  const specialArea = row.querySelector(".specialSizeArea");
  const specialSelect = row.querySelector(".specialSize");
  const bespokeArea = row.querySelector(".bespokeInputArea");
  const bespokeInput = row.querySelector(".bespokeInput");
  const btn = row.querySelector(".measure");

  if (select.value === "__OTHER__") {
    specialArea.classList.remove("hidden");
  } else {
    specialArea.classList.add("hidden");

    if (specialSelect) specialSelect.value = "";
    if (bespokeArea) bespokeArea.classList.add("hidden");
    if (bespokeInput) bespokeInput.value = "";
    if (btn) btn.classList.add("hidden");
  }
}


// 特注サイズ／別寸の切替
function checkSpecialSize(select) {

  const row = select.closest("tr");
  const bespokeArea = row.querySelector(".bespokeInputArea");
  const btn = row.querySelector(".measure");

  if (select.value === "別寸") {
    bespokeArea.classList.remove("hidden");
    btn.classList.remove("hidden");
  } else {
    bespokeArea.classList.add("hidden");
    btn.classList.add("hidden");
  }
}


// 現在選択中の職種・性別データを取得
function getSelectedJobData() {

  const job = document.getElementById("job").value;
  const gender = document.getElementById("gender").value;

  if (!currentData || !job || !gender) {
    return null;
  }

  return currentData.jobs.find(j =>
    j.job === job && j.gender === gender
  );
}


// 行のサイズ情報を取得
function getRowSizeInfo(row) {

  const mainSizeSelect = row.querySelector(".mainSize");
  const specialSizeSelect = row.querySelector(".specialSize");
  const bespokeInput = row.querySelector(".bespokeInput");

  let size = "";
  let sizeType = "";
  let bespokeText = "";

  if (!mainSizeSelect) {
    return {
      size: "",
      sizeType: "",
      bespokeText: "",
      valid: false
    };
  }

  if (mainSizeSelect.value === "__OTHER__") {

    if (!specialSizeSelect || !specialSizeSelect.value) {
      return {
        size: "",
        sizeType: "",
        bespokeText: "",
        valid: false
      };
    }

    size = specialSizeSelect.value;

    if (size === "別寸") {
      sizeType = "bespoke";
      bespokeText = bespokeInput ? bespokeInput.value : "";
    } else {
      sizeType = "custom";
    }

  } else {

    size = mainSizeSelect.value;

    if (!size) {
      return {
        size: "",
        sizeType: "",
        bespokeText: "",
        valid: false
      };
    }

    sizeType = "standard";
  }

  return {
    size,
    sizeType,
    bespokeText,
    valid: true
  };
}


// 枚数計算
// 枚数計算
function updateCategorySummary() {

  const jobData = getSelectedJobData();
  const area = document.getElementById("categoryStatus");

  if (!jobData) {
    area.innerHTML = "";
    return;
  }

  const counts = {};
  const limits = {};
  const selectedByProductCategory = {};

  // 貸与数の上限をセット
  jobData.categoryLimits.forEach(rule => {
    limits[rule.productCategory] = rule.limit;
    counts[rule.productCategory] = 0;
  });

  const rows = document.querySelectorAll("#table tr");

  rows.forEach((row, i) => {

    const productCategory = row.dataset.productCategory;

    // カテゴリ見出し行・商品ヘッダー行は計算対象外
    if (!productCategory) return;

    const qtyInput = row.querySelector("input[type='number']");
    const qty = Number(qtyInput.value) || 0;

    if (qty <= 0) return;

    // サイズ未選択の場合は枚数計算しない
    const sizeInfo = getRowSizeInfo(row);
    if (!sizeInfo.valid) return;

    // その商品カテゴリ内で何枚選ばれているか
    if (selectedByProductCategory[productCategory] === undefined) {
      selectedByProductCategory[productCategory] = 0;
    }

    selectedByProductCategory[productCategory] += qty;

    // 消費カテゴリへの換算
    const rules = jobData.conversionRules.filter(r =>
      r.fromProductCategory === productCategory
    );

    rules.forEach(rule => {

      if (counts[rule.toConsumptionCategory] === undefined) {
        counts[rule.toConsumptionCategory] = 0;
      }

      counts[rule.toConsumptionCategory] += qty * rule.qty;
    });
  });

  // 上部の現在貸与枚数エリア
  let html = "<h3>現在の貸与枚数</h3>";

  Object.keys(limits).forEach(category => {

    const current = counts[category] || 0;
    const limit = limits[category];

    let className = "category-normal";

    if (current > limit) {
      className = "category-over";
    } else if (current === limit) {
      className = "category-ok";
    } else if (limit - current === 1) {
      className = "category-warning";
    }

    html += `<div class="${className}">
      ${category}：${current} / ${limit}
    </div>`;
  });

  area.innerHTML = html;

  // 各カテゴリ見出しにも枚数を反映
  const headingElements = document.querySelectorAll("[data-category-heading]");

  headingElements.forEach(el => {

    const category = el.dataset.categoryHeading;
    const countSpan = el.querySelector(".category-count");

    if (!countSpan) return;

    const limit = limits[category];
    const current = counts[category] || 0;
    const selected = selectedByProductCategory[category] || 0;

    countSpan.classList.remove(
      "category-count-ok",
      "category-count-warning",
      "category-count-over"
    );

    // 貸与数があるカテゴリ
    if (limit !== undefined) {

      countSpan.innerText = `（合計${limit}枚） 選択中 ${current}/${limit}`;

      if (current > limit) {
        countSpan.classList.add("category-count-over");
      } else if (current === limit) {
        countSpan.classList.add("category-count-ok");
      } else if (limit - current === 1) {
        countSpan.classList.add("category-count-warning");
      }

    } else {

      // ワンピースなど、直接の貸与数を持たないカテゴリ
      if (selected > 0) {
        countSpan.innerText = `選択中 ${selected}枚`;
      } else {
        countSpan.innerText = "";
      }
    }
  });
}

// 登録
function submitData() {

  if (!document.getElementById("sei").value) {
    alert("氏を入力してください");
    return;
  }

  if (!document.getElementById("mei").value) {
    alert("名を入力してください");
    return;
  }

  if (!document.getElementById("gender").value) {
    alert("性別を選択してください");
    return;
  }

  if (!document.getElementById("job").value) {
    alert("職種を選択してください");
    return;
  }

  const now = new Date();

  const common = {
    id: Date.now(),
    createdAt: now.toLocaleString("ja-JP"),
    updatedAt: now.toLocaleString("ja-JP"),
    customerCode: currentData.customerCode,
    customerName: currentData.customerName,
    sei: document.getElementById("sei").value,
    mei: document.getElementById("mei").value,
    gender: document.getElementById("gender").value,
    job: document.getElementById("job").value
  };

  const rows = document.querySelectorAll("#table tr");
  let data = [];
  let errorMessage = "";

  rows.forEach((row, i) => {

    // カテゴリ見出し行・商品ヘッダー行は登録対象外
    if (!row.dataset.productCategory) return;

    const cells = row.querySelectorAll("td");

    const product = cells[0].innerText;
const productCode = cells[1].innerText;
const color = cells[2].innerText;

const qty = Number(cells[4].querySelector("input").value) || 0;

    if (qty <= 0) return;

    const sizeInfo = getRowSizeInfo(row);

    if (!sizeInfo.valid) {
      errorMessage = product + " のサイズを選択してください";
      return;
    }

    if (sizeInfo.size === "別寸" && !sizeInfo.bespokeText) {
      errorMessage = product + " の別寸サイズを入力してください";
      return;
    }

    data.push({
  ...common,
  product,
  productCode,
  color,
  size: sizeInfo.size,
  sizeType: sizeInfo.sizeType,
  bespokeText: sizeInfo.bespokeText,
  qty,
  productCategory: row.dataset.productCategory
});
  });

  if (errorMessage) {
    alert(errorMessage);
    return;
  }

  if (data.length === 0) {
    alert("商品が入力されていません（サイズ・数量）");
    return;
  }

  console.log(data);

  fetch("https://script.google.com/macros/s/AKfycbycFkYteNOah_vtLt0lTbugo7W5o-oSPHkRWpwKC-p-5G3JW_DkIAF5pxUjw6piJYeRRw/exec", {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(data)
  });

  alert("登録送信しました（シート確認）");
}

</script>

</body>
</html>
