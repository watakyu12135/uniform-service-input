<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>登録内容確認</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; padding: 20px; }
.section { margin-top: 18px; padding: 14px; border: 1px solid #ccc; background: #fff; }
.info-row { margin: 6px 0; }
table { border-collapse: collapse; width: 100%; min-width: 700px; }
.table-wrap { overflow-x: auto; width: 100%; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
th { background: #f2f6fb; }
.notice { padding: 10px; background: #fff7e6; border-left: 4px solid #f5a623; }
.error { color: #c00; font-weight: bold; }
button { margin-top: 12px; margin-right: 8px; padding: 8px 14px; }
input { font-size: 16px; padding: 6px; max-width: 320px; width: 100%; box-sizing: border-box; }
label { font-weight: bold; display: block; margin-top: 10px; }
.small { font-size: 13px; color: #555; }
</style>
</head>
<body>
<h2>登録内容確認</h2>
<div id="message" class="error"></div>

<div class="section">
  <h3>基本情報</h3>
  <div class="info-row">顧客：<span id="customerName"></span></div>
  <div class="info-row">氏名：<span id="fullName"></span></div>
  <div class="info-row">性別：<span id="gender"></span></div>
  <div class="info-row">職種：<span id="job"></span></div>
  <div class="info-row">部署：<span id="department"></span></div>
</div>

<div class="section">
  <h3>商品選択内容</h3>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>商品名</th>
          <th>商品コード</th>
          <th>色</th>
          <th>サイズ</th>
          <th>数量</th>
          <th>商品カテゴリ</th>
        </tr>
      </thead>
      <tbody id="orderRows"></tbody>
    </table>
  </div>
</div>

<div class="section" id="measurementSection">
  <h3>採寸入力内容</h3>
  <div id="measurementContent"></div>
</div>

<div class="section">
  <h3>控えメール</h3>
  <div class="notice">
    登録内容を自分にメールする場合は入力してください。<br>
    メールアドレスは弊社には保存されません。
  </div>
  <label for="email">メールアドレス</label>
  <input id="email" type="email" autocomplete="email">
  <label for="emailConfirm">メールアドレス再入力</label>
  <input id="emailConfirm" type="email" autocomplete="email">
</div>

<div class="section">
  <h3>修正用番号</h3>
  <div class="notice">
    任意の4桁の番号を入力してください。お問い合わせの際に必要になります。<br>
    ※半角数字4桁。同じ数字4つ（0000、1111など）は使用できません.
    
  </div>
  <label for="pin">4桁の番号</label>
  <input id="pin" inputmode="numeric" maxlength="4" autocomplete="off">
  <div class="small">例：2486</div>
</div>

<button type="button" onclick="submitConfirmedData()">登録</button>
<button type="button" onclick="goBack()">戻る</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzifpGEKoydnvI9RAU6evgnHoWQh2YTx7WfXtqsi8O7tMoGbnyXzCC5bIVUY9QmUGZdlA/exec";
let draft = null;

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function loadDraft() {
  const raw = sessionStorage.getItem("uniformDraft");
  if (!raw) {
    document.getElementById("message").innerText = "確認する登録内容がありません。入力画面からやり直してください。";
    return;
  }

  try {
    draft = JSON.parse(raw);
  } catch (e) {
    document.getElementById("message").innerText = "登録内容の読み込みに失敗しました。入力画面からやり直してください。";
    return;
  }

  const orders = draft.orders || [];
  const first = orders[0] || {};

  document.getElementById("customerName").innerText = first.customerName || "";
  document.getElementById("fullName").innerText = `${first.sei || ""} ${first.mei || ""}`.trim();
  document.getElementById("gender").innerText = first.gender || "";
  document.getElementById("job").innerText = first.job || "";
  document.getElementById("department").innerText = first.department || "なし";

  const tbody = document.getElementById("orderRows");
  tbody.innerHTML = orders.map(item => `
    <tr>
      <td>${escapeHtml(item.product)}</td>
      <td>${escapeHtml(item.productCode)}</td>
      <td>${escapeHtml(item.color)}</td>
      <td>${escapeHtml(item.size)}</td>
      <td>${escapeHtml(item.qty)}</td>
      <td>${escapeHtml(item.productCategory)}</td>
    </tr>
  `).join("");

  renderMeasurement(draft.measurement);
}

function renderMeasurement(measurement) {
  const section = document.getElementById("measurementSection");
  const area = document.getElementById("measurementContent");

  if (!measurement) {
    area.innerText = "採寸入力なし";
    return;
  }

  const keys = Object.keys(measurement).filter(key => {
    const value = measurement[key];
    return value !== "" && value !== null && value !== undefined;
  });

  if (keys.length === 0) {
    area.innerText = "採寸入力なし";
    return;
  }

  area.innerHTML = `
    <div class="table-wrap">
      <table>
        <tbody>
          ${keys.map(key => `
            <tr>
              <th>${escapeHtml(key)}</th>
              <td>${escapeHtml(measurement[key])}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function validateEmail() {
  const email = document.getElementById("email").value.trim();
  const emailConfirm = document.getElementById("emailConfirm").value.trim();

  if (!email && !emailConfirm) return true;

  if (!email || !emailConfirm) {
    alert("メールアドレスを入力する場合は、再入力欄も入力してください。");
    return false;
  }

  if (email !== emailConfirm) {
    alert("メールアドレスが一致しません。");
    return false;
  }

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert("メールアドレスの形式が正しくありません。");
    return false;
  }

  return true;
}

function validatePin() {
  const pin = document.getElementById("pin").value.trim();

  if (!/^\d{4}$/.test(pin)) {
    alert("4桁の番号は半角数字4桁で入力してください。");
    return false;
  }

  if (/^(\d)\1{3}$/.test(pin)) {
    alert("同じ数字4つの番号は使用できません。");
    return false;
  }

  return true;
}

function submitConfirmedData() {
  if (!draft) {
    alert("登録内容がありません。入力画面からやり直してください。");
    return;
  }

  if (!validateEmail()) return;
  if (!validatePin()) return;

  const email = document.getElementById("email").value.trim();
  const pin = document.getElementById("pin").value.trim();

  const payload = JSON.parse(JSON.stringify(draft));

  payload.contactEmail = email;
  payload.contactPin = pin;

  if (payload.orders) {
    payload.orders.forEach(item => {
      item.contactPin = pin;
    });
  }

  if (payload.measurement) {
    payload.measurement["修正用番号"] = pin;
  }

  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(payload)
  });

  sessionStorage.setItem("uniformComplete", JSON.stringify({
    pin,
    customerName: (payload.orders && payload.orders[0] && payload.orders[0].customerName) || "",
    sei: (payload.orders && payload.orders[0] && payload.orders[0].sei) || "",
    mei: (payload.orders && payload.orders[0] && payload.orders[0].mei) || "",
    job: (payload.orders && payload.orders[0] && payload.orders[0].job) || ""
  }));

  sessionStorage.removeItem("uniformDraft");
  location.href = "complete.html";
}

function goBack() {
  history.back();
}

loadDraft();
</script>
</body>
</html>
