<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>登録内容確認</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; padding: 20px; }
.section { margin-top: 18px; padding: 14px; border: 1px solid #ccc; background: #fff; }
.info-row { margin: 6px 0; }
.notice { padding: 10px; background: #fff7e6; border-left: 4px solid #f5a623; }
.error { color: #c00; font-weight: bold; }
button { margin-top: 12px; margin-right: 8px; padding: 10px 16px; width: 100%; }
input { font-size: 16px; padding: 6px; width: 100%; box-sizing: border-box; }
label { font-weight: bold; display: block; margin-top: 10px; }
.small { font-size: 13px; color: #555; }
.category { font-weight: bold; margin-top: 14px; border-bottom: 1px solid #ccc; }
.item { padding: 8px; background: #f9f9f9; margin-top: 6px; }
.check-area { margin-top: 20px; }
.check-area label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: normal;
  margin-top: 0;
}

.check-area input[type="checkbox"] {
  width: auto;
  margin: 0;
}

.hidden {
  display: none;
}

</style>
</head>

<body>

<h2>登録内容確認</h2>
<div id="message" class="error"></div>

<!-- 基本情報 -->
<div class="section">
  <h3>基本情報</h3>
  <div class="info-row">顧客：<span id="customerName"></span></div>
  <div id="employeeNoRow" class="info-row hidden">職員番号：<span id="employeeNo"></span></div>
  <div class="info-row">氏名：<span id="fullName"></span></div>
<div class="info-row">フリガナ：<span id="fullNameKana"></span></div>
  <div class="info-row">性別：<span id="gender"></span></div>
  <div class="info-row">職種：<span id="job"></span></div>
  <div class="info-row">部署：<span id="department"></span></div>
</div>

<!-- 商品内容（縦並び） -->
<div class="section">
  <h3>商品選択内容</h3>
  <div id="orderArea"></div>
</div>

<!-- 採寸内容 -->
<div class="section">
  <h3>採寸入力内容</h3>
  <div id="measurementContent"></div>
</div>

<!-- 任意4桁 -->
<div class="section">
  <h3>4桁の数字</h3>
  <div class="notice">
    任意の4桁の数字を入力してください。<br>
    登録内容修正時に必要になります。
  </div>
  <label for="pin">4桁の数字</label>
  <input id="pin" inputmode="numeric" maxlength="4" autocomplete="off">
  <div class="small">例：2486</div>
</div>

<div id="duplicateWarningArea" class="section hidden">
  <h3>登録確認</h3>

<div class="notice">
  入力された情報と一致した登録があります。<br><br>
  修正の場合は
  <a id="duplicateReviseLink" href="revise.html">こちら</a>
  をご利用ください。<br><br>
  このまま登録する場合は、チェックを入れて進んでください。
</div>

  <div class="check-area">
    <label>
      <input type="checkbox" id="duplicateConfirmCheck">
      確認の上、このまま登録する
    </label>
  </div>
</div>

<!-- 確認チェック --->
<div class="check-area">
  <label>
    <input type="checkbox" id="confirmCheck">
    入力内容を確認しました
  </label>
</div>

<button id="submitBtn" disabled>登録する</button>
<button type="button" onclick="history.back()">戻る</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzifpGEKoydnvI9RAU6evgnHoWQh2YTx7WfXtqsi8O7tMoGbnyXzCC5bIVUY9QmUGZdlA/exec";
let draft = null;

/* HTMLエスケープ */
function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getCustomerKey() {
  const url = new URL(window.location.href);
  const customerKey =
    url.searchParams.get("customer") ||
    sessionStorage.getItem("uniformCustomer") ||
    draft?.publicKey ||
    draft?.customerKey ||
    draft?.customer ||
    "";

  if (customerKey) {
    sessionStorage.setItem("uniformCustomer", customerKey);
  }

  return customerKey;
}

/* 読み込み */
function loadDraft() {
  const raw = sessionStorage.getItem("uniformDraft");
  if (!raw) {
    document.getElementById("message").innerText =
      "確認する登録内容がありません。入力画面からやり直してください。";
    return;
  }

  try {
    draft = JSON.parse(raw);
  } catch {
    document.getElementById("message").innerText =
      "登録内容の読み込みに失敗しました。入力画面からやり直してください。";
    return;
  }

  const customerKey = getCustomerKey();
  if (customerKey) {
    draft.publicKey = customerKey;
    draft.customerKey = customerKey;
    draft.customer = customerKey;
  }

  const orders = draft.orders || [];
  const first = orders[0] || {};
  const employeeNo = first.employeeNo || first.staffNo || first["職員番号"] || "";
  const employeeNoRow = document.getElementById("employeeNoRow");
  const employeeNoSpan = document.getElementById("employeeNo");
  if (employeeNoRow && employeeNoSpan && employeeNo) {
    employeeNoRow.classList.remove("hidden");
    employeeNoSpan.innerText = employeeNo;
  } else if (employeeNoRow) {
    employeeNoRow.classList.add("hidden");
  }

  document.getElementById("customerName").innerText = first.customerName || "";
  document.getElementById("fullName").innerText =
    `${first.sei || ""} ${first.mei || ""}`.trim();
document.getElementById("fullNameKana").innerText =
  `${first.seiKana || first["シ"] || ""} ${first.meiKana || first["メイ"] || ""}`.trim();
  document.getElementById("gender").innerText = first.gender || "";
  document.getElementById("job").innerText = first.job || "";
  document.getElementById("department").innerText = first.department || "なし";

  renderOrders(orders);
  renderMeasurement(draft.measurement);

  if (draft.editMode) {
    document.querySelector("h2").innerText = "登録内容確認（修正）";
    document.getElementById("submitBtn").innerText = "修正内容を登録する";
  }

  checkDuplicateOnLoad();
}

function renderOrders(orders) {
  const area = document.getElementById("orderArea");
  if (orders.length === 0) {
    area.innerText = "商品選択なし";
    return;
  }

  let html = "";
  let currentCategory = "";

  orders.forEach(o => {
    if (o.productCategory !== currentCategory) {
      currentCategory = o.productCategory;
      html += `<div class="category">${escapeHtml(currentCategory)}</div>`;
    }
    const inseamCm = o["股下cm"] || o.inseamCm || "";

    html += `
      <div class="item">
        <div><strong>${escapeHtml(o.product)}</strong> ${escapeHtml(o.productCode)}</div>
        <div>色：${escapeHtml(o.color)} ／ サイズ：${escapeHtml(o.size)} ／ 数量：${escapeHtml(o.qty)}</div>
        ${inseamCm ? `<div>股下加工：${escapeHtml(inseamCm)}cm</div>` : ""}
      </div>
    `;
  });

  area.innerHTML = html;
}

function renderMeasurement(measurement) {
  const area = document.getElementById("measurementContent");
  if (!measurement) {
    area.innerText = "採寸入力なし";
    return;
  }

  const entries = Object.entries(measurement).filter(([k,v]) => v);
  if (entries.length === 0) {
    area.innerText = "採寸入力なし";
    return;
  }

  area.innerHTML = entries.map(([k,v]) =>
    `<div>${escapeHtml(k)}：${escapeHtml(v)}</div>`
  ).join("");
}

/* チェックが入るまで登録不可 */
document.getElementById("confirmCheck").addEventListener("change", e => {
  document.getElementById("submitBtn").disabled = !e.target.checked;
});


function generateMeasurementNo() {
  const letters = "ABCDEFGHJKMNPQRSTUVWXYZ";
  const letter = letters[Math.floor(Math.random() * letters.length)];
  const number = String(Math.floor(Math.random() * 900000) + 100000);
  return letter + number;
}

/* 4桁チェック */
function validatePin() {
  const pin = document.getElementById("pin").value.trim();
  if (!/^\d{4}$/.test(pin)) {
    alert("4桁の数字を入力してください。");
    return false;
  }
  if (/^(\d)\1{3}$/.test(pin)) {
    alert("同じ数字4つは使用できません。");
    return false;
  }
  return true;
}

async function checkDuplicateBeforeSubmit(payload) {
  const orders = payload.orders || [];
  const first = orders[0] || {};
  const registrationNo = document.getElementById("pin").value.trim();

  const customerKey = getCustomerKey();
  const checkPayload = {
    duplicateCheckOnly: true,
    publicKey: customerKey,
    customerKey: customerKey,
    customer: customerKey,
    customerCode: first.customerCode || first["顧客コード"] || "",
    employeeNo: first.employeeNo || first.staffNo || first["職員番号"] || "",
    staffNo: first.employeeNo || first.staffNo || first["職員番号"] || "",
    "職員番号": first.employeeNo || first.staffNo || first["職員番号"] || "",
    sei: first.sei || first["氏"] || "",
    mei: first.mei || first["名"] || "",
    seiKana: first.seiKana || first["シ"] || "",
    meiKana: first.meiKana || first["メイ"] || "",
    registrationNo: registrationNo
  };

  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(checkPayload)
  });

  const text = await res.text();
  const json = JSON.parse(text);

  if (json.result !== "ok") {
    throw new Error(json.message || "重複チェックに失敗しました。");
  }

  return json;
}

async function checkDuplicateOnLoad() {
  if (!draft || draft.editMode === true) {
    return;
  }

  const orders = draft.orders || [];
  const first = orders[0] || {};

  const customerKey = getCustomerKey();
  const checkPayload = {
    duplicateCheckOnly: true,
    publicKey: customerKey,
    customerKey: customerKey,
    customer: customerKey,
    customerCode: first.customerCode || first["顧客コード"] || "",
    employeeNo: first.employeeNo || first.staffNo || first["職員番号"] || "",
    staffNo: first.employeeNo || first.staffNo || first["職員番号"] || "",
    "職員番号": first.employeeNo || first.staffNo || first["職員番号"] || "",
    sei: first.sei || first["氏"] || "",
    mei: first.mei || first["名"] || "",
    seiKana: first.seiKana || first["シ"] || "",
    meiKana: first.meiKana || first["メイ"] || "",
    registrationNo: ""
  };

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(checkPayload)
    });

    const text = await res.text();
    const json = JSON.parse(text);

    if (json.result === "ok" && json.duplicateNameFound) {
      showDuplicateWarning();
    }

  } catch (err) {
    console.warn("ページ表示時の重複チェックに失敗しました。", err);
  }
}

function showDuplicateWarning() {
  const area = document.getElementById("duplicateWarningArea");
  const check = document.getElementById("duplicateConfirmCheck");
  const reviseLink = document.getElementById("duplicateReviseLink");

  if (area) {
    area.classList.remove("hidden");
  }

  if (check) {
    check.checked = false;
  }

  if (reviseLink) {
    reviseLink.href = "revise.html?customer=" + encodeURIComponent(getCustomerKey());
  }

  window.scrollTo({
    top: area ? area.offsetTop - 20 : 0,
    behavior: "smooth"
  });
}

let submitInProgress = false;

function lockSubmitButton(isEdit) {
  const submitBtn = document.getElementById("submitBtn");
  submitInProgress = true;
  submitBtn.disabled = true;
  submitBtn.innerText = "送信中...";
}

function resetSubmitButton(isEdit) {
  const submitBtn = document.getElementById("submitBtn");
  const confirmCheck = document.getElementById("confirmCheck");
  submitInProgress = false;
  submitBtn.innerText = isEdit ? "修正内容を登録する" : "登録する";
  submitBtn.disabled = !(confirmCheck && confirmCheck.checked);
}

document.getElementById("submitBtn").addEventListener("click", async () => {
  if (submitInProgress) {
    return;
  }

  const submitBtn = document.getElementById("submitBtn");
  const isEdit = draft && draft.editMode === true;

  // 二重押し防止のため、登録前チェックより先に即時ロックする
  lockSubmitButton(isEdit);

  if (!validatePin()) {
    resetSubmitButton(isEdit);
    return;
  }

const duplicateArea = document.getElementById("duplicateWarningArea");
  const duplicateCheck = document.getElementById("duplicateConfirmCheck");
  const duplicateAlreadyConfirmed =
    duplicateArea &&
    !duplicateArea.classList.contains("hidden") &&
    duplicateCheck &&
    duplicateCheck.checked;

  if (!isEdit) {
  try {
    const tempPayload = JSON.parse(JSON.stringify(draft));
    const duplicateResult = await checkDuplicateBeforeSubmit(tempPayload);

    if (duplicateResult.duplicateNameFound && !duplicateAlreadyConfirmed) {
      showDuplicateWarning();
      alert("確認の上、このまま登録する場合はチェックを入れてください。");
      resetSubmitButton(isEdit);
      return;
    }

    if (
      duplicateResult.duplicateNameFound &&
      duplicateAlreadyConfirmed &&
      duplicateResult.sameRegistrationNoFound
    ) {
      alert("その番号はすでに使われています。別番号で登録してください。");
      resetSubmitButton(isEdit);
      return;
    }

  } catch (err) {
    alert("重複チェック中にエラーが発生しました。\n" + err.message);
    resetSubmitButton(isEdit);
    return;
  }
}

  const registrationNo = document.getElementById("pin").value.trim();

  const measurementNo = isEdit
    ? draft.measureNo
    : generateMeasurementNo();

  const registrationType = isEdit
    ? "修正"
    : "新規";
  if (isEdit && !measurementNo) {
    alert("修正対象の採寸番号が取得できません。もう一度検索からやり直してください。");
    resetSubmitButton(isEdit);
    return;
  }

  const payload = JSON.parse(JSON.stringify(draft));
  const customerKey = getCustomerKey();
  payload.publicKey = customerKey;
  payload.customerKey = customerKey;
  payload.customer = customerKey;


  payload["採寸番号"] = measurementNo;
  payload["登録番号"] = registrationNo;
  payload["登録区分"] = registrationType;
  payload["有効フラグ"] = 1;

  payload.editMode = isEdit;
  payload.measureNo = measurementNo;
  payload.registrationType = registrationType;

  // 既存GAS互換用
  payload.measurementNo = measurementNo;
  payload.registrationNo = registrationNo;
  payload.entryType = registrationType;
  payload.activeFlag = 1;
  payload.contactPin = registrationNo;
payload.overrideDuplicate = duplicateAlreadyConfirmed;
payload.rosterMismatchInfo = duplicateAlreadyConfirmed
  ? "同姓同名同音あり（確認後登録）"
  : "";


  payload.orders?.forEach(o => {
  o["採寸番号"] = measurementNo;
  o["登録番号"] = registrationNo;
  o["登録区分"] = registrationType;
  o["有効フラグ"] = 1;

  o.measurementNo = measurementNo;
  o.registrationNo = registrationNo;
  o.entryType = registrationType;
  o.activeFlag = 1;
  o.contactPin = registrationNo;
  o.publicKey = customerKey;
  o.customerKey = customerKey;
  o.customer = customerKey;

  o.overrideDuplicate = duplicateAlreadyConfirmed;
  o.rosterMismatchInfo = duplicateAlreadyConfirmed
    ? "同姓同名同音あり（確認後登録）"
    : "";
});

  if (payload.measurement) {
    payload.measurement["採寸番号"] = measurementNo;
    payload.measurement["登録番号"] = registrationNo;
    payload.measurement["登録区分"] = registrationType;
    payload.measurement["有効フラグ"] = 1;

    // 既存互換用
    payload.measurement["修正用番号"] = registrationNo;
    payload.measurement.measurementNo = measurementNo;
    payload.measurement.registrationNo = registrationNo;
    payload.measurement.entryType = registrationType;
    payload.measurement.activeFlag = 1;
    payload.measurement.contactPin = registrationNo;
    payload.measurement.publicKey = customerKey;
    payload.measurement.customerKey = customerKey;
    payload.measurement.customer = customerKey;
    payload.measurement.employeeNo = payload.measurement.employeeNo || payload.measurement.staffNo || payload.measurement["職員番号"] || payload.employeeNo || "";
    payload.measurement.staffNo = payload.measurement.employeeNo;
    payload.measurement["職員番号"] = payload.measurement.employeeNo;
  }

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    const json = JSON.parse(text);

    if (json.result !== "ok") {
      alert("登録に失敗しました。時間をおいて再度お試しください。\n" + (json.message || ""));
      resetSubmitButton(isEdit);
      return;
    }

    sessionStorage.setItem("uniformComplete", JSON.stringify({
      measureNo: measurementNo,
      registrationNo: registrationNo,
      editMode: isEdit,
      registrationType: registrationType,
      customerKey: customerKey
    }));

    sessionStorage.setItem("uniformMailDraft", JSON.stringify(payload));

    sessionStorage.removeItem("uniformDraft");

    if (isEdit) {
      sessionStorage.removeItem("uniformEditData");
      sessionStorage.removeItem("uniformEditCustomer");
    }

    location.href = "complete.html";

  } catch (err) {
    alert("登録送信中にエラーが発生しました。\n通信環境を確認して、再度お試しください。\n\n" + err.message);

    resetSubmitButton(isEdit);
  }
});


loadDraft();
</script>
</body>
</html>
